# .samohost.toml — samorev landing site
#
# kind = "static": samohost checks out this repo to appDir and reloads Caddy
# (file_server rooted at appDir) on every deploy. No Node.js, no build step.
#
# Web root: the static site lives in site/ within this repo, so the Caddy
# vhost block generated by `samohost app bootstrap` should use:
#   root * /opt/samorev/app/site
# (i.e. append /site to appDir — see samohost bootstrap --static-root when
# that flag is wired, or patch the generated Caddyfile after bootstrap).

name        = "samorev"
repo        = "Tanya301/samorev"
branch      = "samo-site"
appDir      = "/opt/samorev/app"
buildCmd    = "true"
healthUrl   = "https://samorev.samo.team/"
serviceUnit = "caddy"
kind        = "static"
mainHost    = "samorev.samo.team"
dbBackend   = "none"

[provision]
serverType = "cx23"
location   = "fsn1"
