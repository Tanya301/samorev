name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Unit and slash-command smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Bun dependencies
        run: bun install

      - name: Run Bun tests
        run: bun test

      - name: Build Bun CLI
        run: bun run build

      - name: Install test dependencies
        run: python -m pip install -r tests/requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -m 'not api' -q

      - name: Install slash command
        run: bash scripts/install-claude-command.sh

      - name: Provider planning smoke
        run: python lib/provider_planning.py https://github.com/example-org/example-repo/pull/17 --shell

      - name: Bun CLI smoke
        run: bun run samorev review https://github.com/example-org/example-repo/pull/17 --no-comment --blocking --smoke

  site-e2e:
    name: Landing page e2e (Playwright / Chromium)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Bun dependencies
        run: bun install

      - name: Install Playwright
        run: npm install --save-dev @playwright/test

      - name: Install Chromium browser
        run: npx playwright install --with-deps chromium

      - name: Run landing page e2e tests
        run: npx playwright test --config=playwright.config.ts
